<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo del árbol Copal reconstruido fielmente desde análisis pixel del original</desc>

<!-- ═══ TRUNK — tapered naturally, no pot ═══ -->
<!-- Single organic trunk shape that widens gradually toward the base -->
<path d="M325,143 C325,143 320,300 315,450 C312,530 308,600 305,660 L365,660 C362,600 358,530 355,450 C350,300 345,143 345,143 Z" fill="#7d5c3c" style="fill:rgb(125, 92, 60);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- ═══ BRANCH A — upper-right short (spine → leaf ②) ═══ -->
<line x1="340" y1="242" x2="437" y2="170" stroke="#7d5c3c" stroke-width="14" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(125, 92, 60);color:rgb(255, 255, 255);stroke-width:14px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

